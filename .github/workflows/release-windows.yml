name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example, 1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish portable executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate version
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION.Trim().TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$') {
            throw "Version must be valid SemVer, for example 1.2.3 or 1.2.3-beta.1"
          }
          "VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Apply release version
        run: npm version $env:VERSION --no-git-tag-version --allow-same-version

      - name: Build Windows executable
        run: npm run dist:win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Image Atelier ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release/*.exe
